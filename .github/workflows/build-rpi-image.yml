name: Build Raspberry Pi Image

# Wird ausgelöst wenn ein Release-Tag (z.B. v1.2.0) gepusht wird
# oder manuell über "Run workflow" in GitHub Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versionsnummer (z.B. v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build-image:
    name: Build Raspberry Pi Image
    runs-on: ubuntu-latest

    # Genug Platz für Pi-OS-Image (~2 GB download, ~4 GB entpackt, ~4 GB Output)
    # ubuntu-latest hat ~14 GB Disk – reicht aus

    steps:
      # ---- Quellcode auschecken ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---- .NET 10 einrichten ------------------------------
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ---- Versionsnummer ermitteln ------------------------
      - name: Versionsnummer ermitteln
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # ---- .NET App für linux-arm64 bauen ------------------
      - name: Publish StockTV (linux-arm64, self-contained)
        run: |
          dotnet publish StockTvBlazor/StockTvBlazor.csproj \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained \
            --output build/rpi/publish \
            -p:UseAppHost=true

      # ---- Abhängigkeiten für Image-Builder installieren ---
      - name: Image-Builder Abhängigkeiten installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static \
            binfmt-support \
            kpartx \
            parted \
            e2fsprogs \
            curl \
            xz-utils

          # QEMU-Binfmt registrieren (nötig für ARM64-chroot)
          sudo update-binfmts --enable qemu-aarch64 || true

      # ---- Raspberry Pi Image bauen ------------------------
      - name: Raspberry Pi Image bauen
        env:
          STOCKTV_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x build/rpi/build-image.sh
          sudo --preserve-env=STOCKTV_VERSION bash build/rpi/build-image.sh

      # ---- Image umbenennen für Upload ---------------------
      - name: Image-Dateipfad ermitteln
        id: imagepath
        run: |
          IMG=$(ls build/rpi/stocktv-rpi-*.img.xz | head -1)
          echo "path=$IMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $IMG)" >> "$GITHUB_OUTPUT"

      # ---- Als Workflow-Artefakt hochladen (für Tests) -----
      - name: Image als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.imagepath.outputs.name }}
          path: ${{ steps.imagepath.outputs.path }}
          retention-days: 7

      # ---- Zip für manuelle Pi-Installation erstellen ------
      - name: Release-Zip erstellen
        run: |
          cd build/rpi/publish
          zip -r ../stocktv-rpi.zip .

      # ---- GitHub Release anlegen / aktualisieren ----------
      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: StockTV ${{ steps.version.outputs.version }}
          body: |
            ## StockTV ${{ steps.version.outputs.version }}

            ### Raspberry Pi – Fertiges Image
            **`${{ steps.imagepath.outputs.name }}`** – direkt mit [Raspberry Pi Imager](https://www.raspberrypi.com/software/) flashen.

            | Einstellung | Wert |
            |---|---|
            | SSH-User | `pi` |
            | SSH-Passwort | `stocktv` |
            | Hostname | `stocktv` |
            | Web-UI | `http://<ip>:8080` |

            > Passwort nach dem ersten Login ändern: `passwd`

            ### Raspberry Pi – Manuelle Installation
            **`stocktv-rpi.zip`** – für bestehende Pi-Installationen via `install.sh`.

          files: |
            ${{ steps.imagepath.outputs.path }}
            build/rpi/stocktv-rpi.zip
          draft: false
          prerelease: false
