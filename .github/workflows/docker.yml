name: Docker Build & Push

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"

  workflow_dispatch:
    inputs:
      version:
        description: "Docker Version (z.B. v0.1.0 oder dev)"
        required: true
        default: "dev"
      platforms:
        description: "Zielplattformen, Komma-getrennt (z.B. nur 'linux/amd64' zum Seeden eines neuen GHCR-Packages)"
        required: false
        default: "linux/amd64,linux/arm64"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          platforms: ${{ inputs.platforms }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/stocktv:${{ inputs.version }}
            ghcr.io/${{ steps.repo.outputs.owner }}/stocktv:latest